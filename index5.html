<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Vibe Coding Studio Pro v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden selection:bg-cyan-500 selection:text-slate-950">

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 flex justify-between items-center shadow-2xl z-40">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-cyan-500 to-purple-500 p-2 rounded-xl text-slate-950 font-black animate-pulse shadow-lg shadow-cyan-500/20">⚡</div>
            <div>
                <h1 class="text-lg font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">VIBE CODING STUDIO <span class="text-xs bg-slate-800 text-slate-300 font-mono px-2 py-0.5 rounded border border-slate-700 ml-1">PRO v3.0</span></h1>
                <p class="text-xs text-slate-400 font-mono">Upgraded Multimodal Prototyping Engine</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 shadow-inner">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div>
                <span id="statusText" class="text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase">Engine Status: Ready</span>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden relative">
        
        <section class="w-1/3 min-w-[380px] max-w-[500px] border-r border-slate-800 bg-slate-900/30 p-5 flex flex-col gap-5 overflow-y-auto z-20">
            
            <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 shadow-xl">
                <label class="block text-xs font-bold font-mono uppercase tracking-widest text-slate-400 mb-2">📷 Visual Asset Pipeline (Mockups / Sketch)</label>
                <div class="border border-dashed border-slate-700 hover:border-cyan-400 rounded-xl p-5 transition-all duration-300 text-center cursor-pointer relative bg-slate-950/60 group">
                    <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-30">
                    <div class="space-y-2 pointer-events-none transition-transform group-hover:scale-[1.02]">
                        <p id="uploadText" class="text-xs font-mono text-slate-400">Drag & drop asset or <span class="text-cyan-400 underline">browse locally</span></p>
                        <p class="text-[10px] text-slate-500 font-mono">Injected dynamically into upgraded execution loops</p>
                    </div>
                    <img id="imagePreview" class="hidden mt-3 max-h-36 mx-auto rounded-lg border border-slate-800 shadow-2xl object-cover animate-fade-in">
                </div>
            </div>

            <div class="flex-1 flex flex-col bg-slate-900/60 border border-slate-800 rounded-2xl p-4 shadow-xl">
                <label class="block text-xs font-bold font-mono uppercase tracking-widest text-slate-400 mb-2">📝 Master Blueprint Core Directives</label>
                <textarea id="promptInput" placeholder="Describe layout system requirements. E.g., Headphones store with dynamic local states, functioning counters, item breakdowns..." 
                          class="w-full flex-1 bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-400 font-mono resize-none shadow-inner transition-all"></textarea>
                
                <button id="generateBtn" class="mt-4 w-full bg-gradient-to-r from-cyan-500 to-purple-500 hover:from-cyan-400 hover:to-purple-400 text-slate-950 font-black py-4 px-6 rounded-xl text-center active:scale-[0.99] transition-all shadow-xl shadow-cyan-500/10 tracking-widest uppercase text-xs">
                    🚀 Build Engine Canvas From Scratch
                </button>
            </div>

            <div id="tweakSection" class="opacity-60 pointer-events-none transition-all duration-300 bg-slate-900/60 border border-slate-800 rounded-2xl p-4 shadow-xl">
                <label class="block text-xs font-bold font-mono uppercase tracking-widest text-purple-400 mb-2">🔄 Live Agentic Adjustments & Iterations</label>
                <input type="text" id="updatePromptInput" placeholder="e.g., 'Add a dark mode toggle button' or 'Increase grid items to 6'..." 
                       class="w-full bg-slate-950 border border-slate-800 focus:border-purple-400 rounded-xl p-3 text-xs text-slate-200 placeholder-slate-600 focus:outline-none font-mono mb-2 shadow-inner">
                <button id="updateBtn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-400 hover:to-pink-400 text-slate-950 font-black py-2.5 px-4 rounded-xl text-center active:scale-[0.99] transition-all shadow-lg tracking-widest uppercase text-[10px]">
                    ⚡ Apply Realtime Code Evolution Tweak
                </button>
            </div>
        </section>

        <section class="w-2/3 flex flex-col bg-slate-950 p-4 relative h-full">
            
            <div class="flex justify-between items-center border-b border-slate-900 mb-3 text-xs font-mono font-bold tracking-wider">
                <div class="flex">
                    <button id="tabPreviewBtn" class="px-5 py-3 text-cyan-400 border-b-2 border-cyan-400 transition-all outline-none">🌐 LIVE APPLICATION RENDER</button>
                    <button id="tabCodeBtn" class="px-5 py-3 text-slate-500 hover:text-slate-300 border-b-2 border-transparent transition-all outline-none">💻 COMPILED SOURCE CODE</button>
                </div>
                <div class="flex items-center gap-2 mb-1">
                    <button id="copyCodeBtn" class="bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-cyan-400 px-3 py-1.5 rounded-lg border border-slate-800 transition-all text-[10px] uppercase font-bold">📋 Copy Source</button>
                    <button id="downloadCodeBtn" class="bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-purple-400 px-3 py-1.5 rounded-lg border border-slate-800 transition-all text-[10px] uppercase font-bold">💾 Export HTML</button>
                </div>
            </div>

            <div class="flex-1 bg-white rounded-2xl overflow-hidden shadow-2xl relative flex flex-col border border-slate-900">
                
                <div id="previewContainer" class="w-full h-full z-10">
                    <iframe id="sandboxFrame" class="w-full h-full bg-white border-none" sandbox="allow-scripts" srcdoc='
                        <!DOCTYPE html>
                        <html>
                        <body style="background: #020617; color: #64748b; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center;">
                            <div style="font-size: 40px; margin-bottom: 10px;">🎨</div>
                            <div style="font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase; font-size: 12px; color: #94a3b8;">Workspace Execution Canvas Idle</div>
                            <div style="font-size: 11px; color: #475569; margin-top: 5px; max-width: 300px;">Input parameters and activate generation to initialize your playground framework setup.</div>
                        </body>
                        </html>
                    '></iframe>
                </div>

                <div id="codeContainer" class="w-full h-full hidden bg-slate-900 p-5 overflow-auto font-mono text-xs text-emerald-400 select-all whitespace-pre shadow-inner leading-relaxed selection:bg-slate-800"></div>
                
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center gap-4 transition-all duration-300 z-50">
                    <div class="relative w-16 h-16 flex items-center justify-center">
                        <div class="absolute inset-0 border-4 border-purple-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-t-purple-400 rounded-full animate-spin"></div>
                        <div class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></div>
                    </div>
                    <div class="text-center font-mono space-y-1">
                        <p class="text-purple-400 font-black tracking-widest text-xs uppercase animate-pulse">Running Upgraded Synthesis Pipeline...</p>
                        <p class="text-[10px] text-slate-500 max-w-sm">Compiling components using upgraded architecture configurations...</p>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';

        // ===== PERMANENT GEMINI API KEY =====
        const GEMINI_API_KEY = "AQ.Ab8RN6L2uO7tB0sSO-HzkqOO5tAtqJgSBE3mz2Hiv1zmJoXTBg";
        console.log("Using API key:", GEMINI_API_KEY);

        let base64ImagePayload = null;
        let globalApplicationSourceCodeState = "";
        
        // Upgraded Model Assignment Block
        const TARGET_AI_MODEL = 'gemini-2.5-flash';

        // UI Target Hooks
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadText = document.getElementById('uploadText');
        const tweakSection = document.getElementById('tweakSection');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const sandboxFrame = document.getElementById('sandboxFrame');
        const codeContainer = document.getElementById('codeContainer');
        const tabPreviewBtn = document.getElementById('tabPreviewBtn');
        const tabCodeBtn = document.getElementById('tabCodeBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        // Engineering Target Context Base Prompt Blueprint
        const systemEngineeringInstruction = `
            You are a lead system frontend engineer specialized in producing production-ready layouts.
            Analyze the input design mockup guidelines and text requests and return an absolute masterpiece single-file HTML environment.
            
            STRICT ARCHITECTURE DIRECTIVES:
            1. Styling Injection: Include this script inside the document <head>: <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"><\/script>
            2. Fully Functioning Interactive Logic: You must build deep functional features. If data storage, form inputs, dynamic grid maps, list modifications, checkout additions, increments, tab conversions, or graph visualizers are implied, you MUST write complete, clean vanilla JavaScript logic inside a module block right before the end of your </body> element.
            3. Asset Render Fallback System: If images are implied, you MUST NOT leave them blank or broken. Use beautiful placeholder blocks or robust SVG patterns styling them directly via Tailwind (e.g., beautiful geometric divs or icon containers).
            4. Absolute Format Integrity: Do NOT respond with markdown fences like \`\`\`html or code blocks. Return ONLY the raw code string ready to load directly into browser viewports. 
            5. Design Standards: Inject sleek layouts, rich micro-interactions, explicit tracking parameters, and glassmorphic modern visual vibes.
            6. FULL DOCUMENT RETURN: You must ALWAYS return the entire, complete HTML source code from <!DOCTYPE html> to </html>. Never return snippets, summaries, or partial edits.
        `;

        // Image Attachment Context File-Reader Listener Interface
        imageInput.addEventListener('change', (e) => {
            const uploadedFile = e.target.files[0];
            if (uploadedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64ImagePayload = event.target.result;
                    imagePreview.src = base64ImagePayload;
                    imagePreview.classList.remove('hidden');
                    uploadText.innerText = `Pipeline Target Block Locked: ${uploadedFile.name}`;
                };
                reader.readAsDataURL(uploadedFile);
            }
        });

        // Interactive Project View State Switcher Controller Engine
        tabPreviewBtn.addEventListener('click', () => {
            tabPreviewBtn.className = "px-5 py-3 text-cyan-400 border-b-2 border-cyan-400 transition-all outline-none";
            tabCodeBtn.className = "px-5 py-3 text-slate-500 hover:text-slate-300 border-b-2 border-transparent transition-all outline-none";
            previewContainer.classList.remove('hidden');
            codeContainer.classList.add('hidden');
        });

        tabCodeBtn.addEventListener('click', () => {
            tabCodeBtn.className = "px-5 py-3 text-cyan-400 border-b-2 border-cyan-400 transition-all outline-none";
            tabPreviewBtn.className = "px-5 py-3 text-slate-500 hover:text-slate-300 border-b-2 border-transparent transition-all outline-none";
            codeContainer.classList.remove('hidden');
            previewContainer.classList.add('hidden');
        });

        // Shared Code Clean-up / Validation Parser Pipeline
        function structuralCodeCleaner(rawTextOutput) {
            let clearedCode = rawTextOutput.trim();
            if (clearedCode.includes("```html")) {
                clearedCode = clearedCode.split("```html")[1].split("```")[0];
            } else if (clearedCode.includes("```")) {
                clearedCode = clearedCode.split("```")[1].split("```")[0];
            }
            return clearedCode;
        }

        // Action Routine: Base Blueprint Component Generator Activation
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const promptDirective = document.getElementById('promptInput').value.trim();
            if (!promptDirective) return alert("Parameter Allocation Missing: Describe your target framework vibe first!");

            loadingOverlay.classList.remove('hidden');
            
            statusText.innerText = "Engine Status: Synthesizing...";
            statusText.className = "text-[10px] font-mono font-bold tracking-wider text-cyan-400 uppercase";
            statusDot.className = "w-2 h-2 rounded-full bg-cyan-400 animate-spin";

            try {
                const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
                const executionContentPackage = [];

                if (base64ImagePayload) {
                    executionContentPackage.push({
                        inlineData: { mimeType: "image/jpeg", data: base64ImagePayload.split(',')[1] }
                    });
                }

                executionContentPackage.push(`Analyze requirements: "${promptDirective}". Construct a fully functional dashboard app incorporating every requested interactive parameter seamlessly.`);

                const synthesisResult = await ai.models.generateContent({
                    model: TARGET_AI_MODEL,
                    contents: executionContentPackage,
                    config: { systemInstruction: systemEngineeringInstruction, temperature: 0.15 }
                });

                globalApplicationSourceCodeState = structuralCodeCleaner(synthesisResult.text);
                
                sandboxFrame.srcdoc = globalApplicationSourceCodeState;
                codeContainer.textContent = globalApplicationSourceCodeState;
                
                tweakSection.classList.remove('opacity-60', 'pointer-events-none');
                tabPreviewBtn.click();

            } catch (err) {
                console.error(err);
                alert(`Pipeline Processing Interrupted:\n${err.message}`);
            } finally {
                loadingOverlay.classList.add('hidden');
                statusText.innerText = "Engine Status: Ready";
                statusText.className = "text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-400 animate-ping";
            }
        });

        // Action Routine: Recursive Code Evolution / Tweak Engine
        document.getElementById('updateBtn').addEventListener('click', async () => {
            const tweakDirective = document.getElementById('updatePromptInput').value.trim();
            if (!tweakDirective) return alert("Adjustment Criteria Target Block Empty.");
            
            loadingOverlay.classList.remove('hidden');
            
            statusText.innerText = "Engine Status: Evolving...";
            statusText.className = "text-[10px] font-mono font-bold tracking-wider text-purple-400 uppercase";
            statusDot.className = "w-2 h-2 rounded-full bg-purple-400 animate-spin";

            try {
                const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
                const evolutionaryPackage = [];

                if (base64ImagePayload) {
                    evolutionaryPackage.push({
                        inlineData: { mimeType: "image/jpeg", data: base64ImagePayload.split(',')[1] }
                    });
                }

                evolutionaryPackage.push(`
                    Context Tracking Profile:
                    You are an automated software agent upgrading an active code file. You must preserve the existing styling base structure, current elements, and active JavaScript state machine unless explicitly told to remove them.
                    
                    Your task is to APPEND, EXPAND, or MODIFY the existing document to add the new content requested by the user.

                    Current Working Base Code:
                    ${globalApplicationSourceCodeState}

                    User Refinement / Addition Directive:
                    "${tweakDirective}"

                    CRITICAL RULES FOR REVISION:
                    1. Do NOT delete the old features to make room for the new ones. Blend them together perfectly.
                    2. If the user asks for a new section, a new form, or additional grid items, write the full HTML/JS layout for it and integrate it smoothly into the current codebase.
                    3. Return the COMPLETELY UPDATED, single-page HTML framework text including all old and new features. No markdown fences.
                `);

                const revisionResult = await ai.models.generateContent({
                    model: TARGET_AI_MODEL,
                    contents: evolutionaryPackage,
                    config: { systemInstruction: systemEngineeringInstruction, temperature: 0.1 }
                });

                globalApplicationSourceCodeState = structuralCodeCleaner(revisionResult.text);
                
                sandboxFrame.srcdoc = globalApplicationSourceCodeState;
                codeContainer.textContent = globalApplicationSourceCodeState;
                document.getElementById('updatePromptInput').value = "";
                tabPreviewBtn.click();

            } catch (err) {
                console.error(err);
                alert(`Evolutionary Matrix Failure:\n${err.message}`);
            } finally {
                loadingOverlay.classList.add('hidden');
                statusText.innerText = "Engine Status: Ready";
                statusText.className = "text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-400 animate-ping";
            }
        });

        // Action Routine: Code Utility Clipboard Handlers
        document.getElementById('copyCodeBtn').addEventListener('click', () => {
            if (!globalApplicationSourceCodeState) return alert("Workspace Core Empty.");
            navigator.clipboard.writeText(globalApplicationSourceCodeState);
            alert("Success: Source code snapshot compiled and written to your system clipboard!");
        });

        document.getElementById('downloadCodeBtn').addEventListener('click', () => {
            if (!globalApplicationSourceCodeState) return alert("Workspace Core Empty.");
            const clusterBlob = new Blob([globalApplicationSourceCodeState], { type: 'text/html' });
            const directAnchorElement = document.createElement('a');
            directAnchorElement.href = URL.createObjectURL(clusterBlob);
            directAnchorElement.download = 'vibe-studio-production-output.html';
            document.body.appendChild(directAnchorElement);
            directAnchorElement.click();
            document.body.removeChild(directAnchorElement);
        });
    </script>
</body>
</html>
